blueprint:
  name: IKEA GRILLPLATS - smart plug schedule
  description: >
    Schedule a switch/plug with an independent **ON** time and **OFF** time (each
    toggled on/off separately), restricted to chosen **days of week**, plus an optional
    **off delay** (auto-off a set time after it turns on — also catches a *manual*
    turn-on, handy as a coffee-machine safety).

    One automation = one schedule. Create several from this blueprint for different
    patterns (e.g. one for weekdays, one for weekends). Everything is configurable
    from the UI.
  domain: automation
  source_url: https://github.com/k0nsta/ha-plug-scheduler-blueprint/blob/master/blueprints/plug_scheduler.yaml
  input:
    sec_target:
      name: Plug / switch
      icon: mdi:power-socket-eu
      input:
        target_switch:
          name: Switch to control
          description: The plug/switch entity to schedule.
          selector:
            entity:
              filter: { domain: switch }

    sec_on:
      name: Turn ON
      icon: mdi:power-plug
      input:
        on_enable:
          name: Enable ON time
          default: true
          selector: { boolean: {} }
        on_time:
          name: ON at
          default: "09:00:00"
          selector: { time: {} }

    sec_off:
      name: Turn OFF
      icon: mdi:power-plug-off
      input:
        off_enable:
          name: Enable OFF time
          default: false
          selector: { boolean: {} }
        off_time:
          name: OFF at
          default: "09:30:00"
          selector: { time: {} }
        off_delay_enable:
          name: Enable off delay (auto-off after it turns on)
          default: true
          selector: { boolean: {} }
        off_delay:
          name: Off delay
          description: Turn off this long after the plug switches on (covers a manual turn-on too).
          default: { hours: 1, minutes: 0, seconds: 0 }
          selector: { duration: {} }

    sec_days:
      name: Days & repeat
      icon: mdi:calendar-week
      input:
        days:
          name: Days of week
          description: The ON/OFF times only run on these days. (Off delay always runs, for safety.)
          default: [mon, tue, wed, thu, fri, sat, sun]
          selector:
            select:
              multiple: true
              mode: list
              options:
                - { label: Monday, value: mon }
                - { label: Tuesday, value: tue }
                - { label: Wednesday, value: wed }
                - { label: Thursday, value: thu }
                - { label: Friday, value: fri }
                - { label: Saturday, value: sat }
                - { label: Sunday, value: sun }
        repeat_weekly:
          name: Repeat weekly
          description: >
            Keep running every week on the chosen days. Turn OFF to run once — the
            schedule disables itself after the next OFF (or off-delay) fires.
          default: true
          selector: { boolean: {} }

mode: queued
max: 5
max_exceeded: silent

triggers:
  - trigger: time
    at: !input on_time
    id: sched_on
  - trigger: time
    at: !input off_time
    id: sched_off
  - trigger: state
    entity_id: !input target_switch
    to: "on"
    for: !input off_delay
    id: delay_off

variables:
  on_enable: !input on_enable
  off_enable: !input off_enable
  off_delay_enable: !input off_delay_enable
  repeat_weekly: !input repeat_weekly

action:
  - choose:
      # ── ON at scheduled time (chosen days) ──
      - conditions:
          - "{{ trigger.id == 'sched_on' and on_enable }}"
          - condition: time
            weekday: !input days
        sequence:
          - action: switch.turn_on
            target: { entity_id: !input target_switch }
      # ── OFF at scheduled time (chosen days) ──
      - conditions:
          - "{{ trigger.id == 'sched_off' and off_enable }}"
          - condition: time
            weekday: !input days
        sequence:
          - action: switch.turn_off
            target: { entity_id: !input target_switch }
          - if: "{{ not repeat_weekly }}"
            then:
              - action: automation.turn_off
                target: { entity_id: "{{ this.entity_id }}" }
      # ── OFF after delay (auto-off; also catches manual on). Not day-gated for safety. ──
      - conditions:
          - "{{ trigger.id == 'delay_off' and off_delay_enable }}"
        sequence:
          - action: switch.turn_off
            target: { entity_id: !input target_switch }
          - if: "{{ not repeat_weekly and not off_enable }}"
            then:
              - action: automation.turn_off
                target: { entity_id: "{{ this.entity_id }}" }
    default: []
