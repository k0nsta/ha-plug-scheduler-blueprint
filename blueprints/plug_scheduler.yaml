blueprint:
  name: IKEA GRILLPLATS - smart plug schedule
  description: >
    Helper-driven plug scheduler. Turns a switch **ON** at a start time and **OFF** at an
    end time (each independently enabled), only on the chosen **days of the week**, with
    optional **repeat-weekly** (one-shot if off — it disables that enable after it fires).

    All schedule values are read **live from helper entities** (input_datetime for the
    times, input_boolean for the enables/repeat, input_text for the days), so a dashboard
    can edit the schedule without touching the automation. One automation = one plug.

    Days helper format: a digit string where 1=Mon … 7=Sun (e.g. "12345" = weekdays).
  domain: automation
  source_url: https://github.com/k0nsta/ha-plug-scheduler-blueprint/blob/master/blueprints/plug_scheduler.yaml
  input:
    sec_target:
      name: Plug / switch
      icon: mdi:power-socket-eu
      input:
        target_switch:
          name: Switch to control
          description: The plug/switch entity to schedule.
          selector:
            entity:
              filter: { domain: switch }

    sec_on:
      name: Turn ON
      icon: mdi:power-plug
      input:
        on_enable_entity:
          name: ON enabled
          description: input_boolean — when on, the plug switches ON at the start time.
          selector:
            entity:
              filter: { domain: input_boolean }
        on_time_entity:
          name: ON at
          description: input_datetime (time) — the start time.
          selector:
            entity:
              filter: { domain: input_datetime }

    sec_off:
      name: Turn OFF
      icon: mdi:power-plug-off
      input:
        off_enable_entity:
          name: OFF enabled
          description: input_boolean — when on, the plug switches OFF at the end time.
          selector:
            entity:
              filter: { domain: input_boolean }
        off_time_entity:
          name: OFF at
          description: input_datetime (time) — the end time.
          selector:
            entity:
              filter: { domain: input_datetime }

    sec_days:
      name: Days & repeat
      icon: mdi:calendar-week
      input:
        days_entity:
          name: Days
          description: input_text holding selected days as digits (1=Mon … 7=Sun), e.g. "12345".
          selector:
            entity:
              filter: { domain: input_text }
        repeat_entity:
          name: Repeat weekly
          description: >
            input_boolean — keep running every week on the chosen days. When off, the
            schedule runs once then disables its own enable helper.
          selector:
            entity:
              filter: { domain: input_boolean }

mode: queued
max: 5
max_exceeded: silent

triggers:
  - trigger: time
    at: !input on_time_entity
    id: sched_on
  - trigger: time
    at: !input off_time_entity
    id: sched_off

variables:
  on_enable_e: !input on_enable_entity
  off_enable_e: !input off_enable_entity
  days_e: !input days_entity
  repeat_e: !input repeat_entity

action:
  - choose:
      # ── ON at the start time (only on chosen days, if enabled) ──
      - conditions:
          - "{{ trigger.id == 'sched_on' }}"
          - "{{ on_enable_e is string and is_state(on_enable_e, 'on') }}"
          - "{{ days_e is string and (now().isoweekday() | string) in states(days_e) }}"
        sequence:
          - action: switch.turn_on
            target: { entity_id: !input target_switch }
          - if: "{{ repeat_e is string and is_state(repeat_e, 'off') }}"
            then:
              - action: input_boolean.turn_off
                target: { entity_id: "{{ on_enable_e }}" }
      # ── OFF at the end time (only on chosen days, if enabled) ──
      - conditions:
          - "{{ trigger.id == 'sched_off' }}"
          - "{{ off_enable_e is string and is_state(off_enable_e, 'on') }}"
          - "{{ days_e is string and (now().isoweekday() | string) in states(days_e) }}"
        sequence:
          - action: switch.turn_off
            target: { entity_id: !input target_switch }
          - if: "{{ repeat_e is string and is_state(repeat_e, 'off') }}"
            then:
              - action: input_boolean.turn_off
                target: { entity_id: "{{ off_enable_e }}" }
    default: []
